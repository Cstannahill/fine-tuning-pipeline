# Unsloth Fine-tuning Pipeline Configuration
# Fuller training profile for Qwen3.5-0.8B on a single ~12GB GPU.

# Model Configuration
model:
  name: "/mnt/s/Code/Models/UC/Qwen3.5/Qwen3.5-0.8B-UC"
  max_seq_length: 2048
  load_in_4bit: true
  dtype: null

# LoRA/QLoRA Configuration
lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.0
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  use_gradient_checkpointing: true
  random_state: 3407
  use_rslora: true
  loftq_config: null

# Dataset Configuration
dataset:
  dataset_name: "combined_reasoning-gpt-sonnet-gemini-opus"
  registry_path: "dataset_info.json"
  max_samples: null
  shuffle: true
  seed: 42
  test_size: 0.05

# Training Configuration
training:
  # NOTE: This key is currently not used by main.py for run output location.
  output_dir: "/mnt/s/Code/Models/fine-tuned/outputs"

  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8

  # Optimization
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  optim: "adamw_8bit"

  # Precision
  fp16: false
  bf16: false

  # Logging
  logging_steps: 10
  logging_first_step: true

  # Evaluation during training
  evaluation_strategy: "steps"
  eval_steps: 200
  save_strategy: "steps"
  save_steps: 200
  save_total_limit: 4

  # Performance
  max_grad_norm: 1.0
  group_by_length: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  resume_from_checkpoint: false
  gradient_checkpointing: true
  max_steps: -1

  # Unsloth specific
  use_unsloth: true

# Evaluation Configuration
evaluation:
  # Disable post-train evaluation by default for Qwen3.5 tokenizer/processor
  # compatibility issues in current stack.
  enabled: true
  fail_on_error: false
  metrics:
    - "perplexity"
    - "bleu"
    - "rouge"
  max_new_tokens: 128
  temperature: 0.7
  top_p: 0.9
  do_sample: true
  custom_evaluator: null

# Output Configuration
output:
  base_dir: "/mnt/s/Code/Models/fine-tuned/outputs"
  adapter_name: "Qwen3.5-0.8B-UC-Sonnet-RP-Lora-Full"
  merged_model_name: "Qwen3.5-0.8B-UC-Sonnet-RP-Merged-Full"
  auto_merge: true
  push_to_hub: false
  hub_model_id: null
  hub_token: null

# Merge Configuration
merge:
  dtype: "float16"
  quantization: null
  device_map: "auto"
  save_method: "merged_16bit"

# Logging Configuration
logging:
  level: "INFO"
  log_file: "training.log"
  tensorboard: true
  wandb:
    enabled: false
    project: "unsloth-finetuning"
    entity: null
    name: null

# System Configuration
system:
  seed: 42
  deterministic: false
  gpu_ids: null
  mixed_precision: "auto"
