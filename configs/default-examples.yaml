---
# Example 8: High Quality Training
# configs/examples/high_quality.yaml
model:
  name: "unsloth/mistral-7b-v0.3"
  load_in_4bit: true

dataset:
  dataset_name: "alpaca_gpt4_en"

lora:
  r: 64
  lora_alpha: 128
  use_rslora: true

training:
  num_train_epochs: 5
  learning_rate: 1.0e-4
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16

evaluation:
  enabled: true

output:
  auto_merge: true

