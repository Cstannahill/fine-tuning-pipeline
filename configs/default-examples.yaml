# Example 1: Quick Training with Alpaca
# configs/examples/alpaca_quick.yaml
model:
  name: "/mnt/s/Code/Models/UC/Gemma-3-270m-heretic"
  load_in_4bit: true

dataset:
  dataset_name: "rpc"
  max_samples: 1000 # Quick test

lora:
  r: 16

training:
  num_train_epochs: 1
  per_device_train_batch_size: 4

output:
  base_dir: "/mnt/s/Code/Models/fine-tuned/outputs"

---
# Example 2: ShareGPT Conversations
# configs/examples/sharegpt.yaml
model:
  name: "unsloth/mistral-7b-v0.3"
  load_in_4bit: true

dataset:
  dataset_name: "sharegpt4"
  test_size: 0.05

training:
  num_train_epochs: 3
  learning_rate: 2.0e-4

---
# Example 3: Code Fine-tuning
# configs/examples/code.yaml
model:
  name: "unsloth/codellama-7b"
  max_seq_length: 4096
  load_in_4bit: true

dataset:
  dataset_name: "codealpaca"

lora:
  r: 32
  lora_alpha: 64
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

training:
  num_train_epochs: 3
  learning_rate: 1.0e-4

